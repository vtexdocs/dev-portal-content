# Creates/updates a Jira task (+ subtasks) when a localization label
# is added to a PR with new markdown content in docs/.
#
# Trigger: localization needed (high|medium|low) on PRs to main under docs/**.
# Skips PRs with the "localization" label (case-insensitive) or l10n* branches
# (case-insensitive). Re-add the label after new commits if it was applied before content changed.
#
# Developer Portal uses en-US source files reviewed in Crowdin in the same language
# (single Crowdin project; no PT/ES translation pipeline).
#
# Label → priority/due: high = High / Friday next week; medium/low add 1–2 weeks.
# Dedupe: PR comment → dp-github-pr-* Jira label → dp-github-pr-ref marker → [DP] fallback.
# Re-runs update the existing parent unless the Prepare file subtask is due (production
# lock): then a Jira comment is posted and automation skips further Jira/Crowdin updates.
# Links source tasks found in the PR title, description, or branch to
# the LOC parent with a `blocks` link.
# Reporter on new tasks/subtasks: PR author (GitHub login → Jira user search;
# PR commit email, GitHub profile/name, optional LOC_JIRA_REPORTER_EMAIL_DOMAIN).
#
# Crowdin: uploads PR-changed files via API, self-imports the same content as
# en-US translation, sets word count on the parent and language subtasks, editor
# links on the English revision subtask. If the Crowdin upload fails, Jira/subtask
# creation still runs; word count and editor links are skipped and a comment is
# posted on the parent task. On success, a success comment is posted after subtasks
# and word count / editor links are updated. Partial upload for existing files with changes in
# Partial upload when the diff meets block/word-count tiers (not new files); full source
# file is attached as Crowdin file context for partial uploads.
# with START/END OF UPDATED SECTION markers.
#
# Secrets — required: LOC_JIRA_BASE_URL, LOC_JIRA_USER_EMAIL, LOC_JIRA_API_TOKEN,
# LOC_JIRA_PROJECT_KEY, LOC_JIRA_EPIC_KEY, LOC_CROWDIN_API_TOKEN,
# LOC_CROWDIN_PROJECT_ID
# Optional: LOC_CROWDIN_ORGANIZATION (Crowdin Enterprise subdomain)

name: Create Localization Ticket

# LOC / Crowdin configuration (edit here if needed).
env:
  LOC_JIRA_WORD_COUNT_FIELD: customfield_10253
  LOC_JIRA_SOURCE_LINK_PROJECT_KEY: EDU
  LOC_JIRA_REPORTER_EMAIL_DOMAIN: '@vtex.com'
  CROWDIN_LANGUAGE: en-US

on:
  pull_request:
    types: [labeled]
    branches: [main]
    paths:
      - 'docs/**/*.md'
      - 'docs/**/*.mdx'

jobs:
  create-jira-ticket:
    if: >
      github.event.label.name == 'localization needed (high)' ||
      github.event.label.name == 'localization needed (medium)' ||
      github.event.label.name == 'localization needed (low)'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Check PR eligibility
        id: eligibility
        run: |
          HEAD_REF='${{ github.event.pull_request.head.ref }}'
          HEAD_REF_LOWER=$(printf '%s' "$HEAD_REF" | tr '[:upper:]' '[:lower:]')

          if [[ "$HEAD_REF_LOWER" == l10n* ]]; then
            echo "Skipping: head branch starts with l10n (case-insensitive): ${HEAD_REF}"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          HAS_LOCALIZATION_LABEL=$(jq -r '
            [.pull_request.labels[].name | ascii_downcase == "localization"] | any
          ' "$GITHUB_EVENT_PATH")

          if [ "$HAS_LOCALIZATION_LABEL" = "true" ]; then
            echo "Skipping: PR has localization label (case-insensitive)"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "PR is eligible for localization automation"
          echo "should_run=true" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.eligibility.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          # PR merge ref includes main workflow scripts even when the head branch is behind.
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0

      - name: Check for content additions
        if: steps.eligibility.outputs.should_run == 'true'
        id: content_diff
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          # Three-dot diff matches the GitHub PR "Files changed" tab (branch-only changes).
          DIFF_RANGE="${BASE_SHA}...${HEAD_SHA}"

          INSERTIONS=$(git -c core.quotepath=false diff --numstat -M \
            "$DIFF_RANGE" \
            -- docs/ \
            | awk '{sum += $1} END {print sum+0}')

          if [ "$INSERTIONS" -gt 0 ]; then
            echo "has_additions=true" >> $GITHUB_OUTPUT
          else
            echo "has_additions=false" >> $GITHUB_OUTPUT
          fi

          CHANGED_FILES=$(git -c core.quotepath=false diff --numstat -M \
            "$DIFF_RANGE" \
            -- docs/ \
            | awk '$1 > 0 {print $3}' \
            | sed 's/^"//;s/"$//' \
            | grep -E '\.(md|mdx)$' \
            | sort || true)

          if [ -n "$CHANGED_FILES" ]; then
            echo "has_eligible_files=true" >> $GITHUB_OUTPUT
          else
            echo "has_eligible_files=false" >> $GITHUB_OUTPUT
            echo "No eligible md/mdx files to upload (e.g. only non-markdown docs/ changes)"
          fi

          {
            echo "changed_files<<EOF"
            echo "$CHANGED_FILES"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Check production lock for existing tasks
        id: production_lock
        if: >-
          steps.eligibility.outputs.should_run == 'true' &&
          steps.content_diff.outputs.has_additions == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          LOC_JIRA_BASE_URL: ${{ secrets.LOC_JIRA_BASE_URL }}
          LOC_JIRA_USER_EMAIL: ${{ secrets.LOC_JIRA_USER_EMAIL }}
          LOC_JIRA_API_TOKEN: ${{ secrets.LOC_JIRA_API_TOKEN }}
          LOC_JIRA_PROJECT_KEY: ${{ secrets.LOC_JIRA_PROJECT_KEY }}
        run: |
          PR_NUMBER=$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")
          GITHUB_REPOSITORY=$(jq -r '.repository.full_name' "$GITHUB_EVENT_PATH")
          PR_REF="${GITHUB_REPOSITORY}#${PR_NUMBER}"
          PR_LABEL="dp-github-pr-$(echo "${GITHUB_REPOSITORY}" | tr '/' '-')-${PR_NUMBER}"
          PREPARE_SUMMARY="Prepare file to be localized"
          TODAY=$(date -u +%Y-%m-%d)

          # shellcheck source=.github/scripts/jira_helpers.sh
          source .github/scripts/jira_helpers.sh

          EXISTING_KEY=$(resolve_existing_parent_key || true)
          if [ -z "$EXISTING_KEY" ]; then
            echo "No existing parent task; production lock does not apply"
            echo "updates_blocked=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PREPARE_SEARCH=$(jira_post_search \
            "parent = ${EXISTING_KEY} AND summary ~ \"${PREPARE_SUMMARY}\" ORDER BY created ASC" \
            "summary,duedate,created" \
            100 || true)
          PREPARE_DUE=$(echo "$PREPARE_SEARCH" | jq -r --arg summary "$PREPARE_SUMMARY" \
            '[.issues[]? | select(.fields.summary == $summary)] |
             sort_by(.fields.created // .key) | .[0].fields.duedate // empty')

          if [ -z "$PREPARE_DUE" ]; then
            echo "Prepare file subtask due date not found for ${EXISTING_KEY}; allowing updates"
            echo "updates_blocked=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$TODAY" < "$PREPARE_DUE" ]]; then
            echo "Before Prepare file due date (${PREPARE_DUE}); allowing updates"
            echo "updates_blocked=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ASSIGNEE=$(curl -s \
            -u "${LOC_JIRA_USER_EMAIL}:${LOC_JIRA_API_TOKEN}" \
            "${LOC_JIRA_BASE_URL}/rest/api/2/issue/${EXISTING_KEY}?fields=assignee" \
            | jq -r '.fields.assignee.displayName // "Assignee"')

          COMMENT_BODY=$(printf '%s, THE TASK WAS UPDATED IN GITHUB!\nBut since it is already in production, it was not automatically updated here. Please check if any changes are needed.' "$ASSIGNEE")
          jira_post_comment "$EXISTING_KEY" "$COMMENT_BODY"

          echo "Production lock active for ${EXISTING_KEY} (Prepare file due: ${PREPARE_DUE}, today: ${TODAY})"
          echo "Posted production lock comment on ${EXISTING_KEY}"
          echo "updates_blocked=true" >> "$GITHUB_OUTPUT"
          echo "blocked_parent_key=${EXISTING_KEY}" >> "$GITHUB_OUTPUT"

      - name: Resolve or create Jira ticket
        id: parent_ticket
        if: >-
          steps.eligibility.outputs.should_run == 'true' &&
          steps.content_diff.outputs.has_additions == 'true' &&
          steps.production_lock.outputs.updates_blocked != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          LOC_JIRA_BASE_URL: ${{ secrets.LOC_JIRA_BASE_URL }}
          LOC_JIRA_USER_EMAIL: ${{ secrets.LOC_JIRA_USER_EMAIL }}
          LOC_JIRA_API_TOKEN: ${{ secrets.LOC_JIRA_API_TOKEN }}
          LOC_JIRA_PROJECT_KEY: ${{ secrets.LOC_JIRA_PROJECT_KEY }}
          LOC_JIRA_EPIC_KEY: ${{ secrets.LOC_JIRA_EPIC_KEY }}
          LOC_JIRA_REPORTER_EMAIL_DOMAIN: ${{ env.LOC_JIRA_REPORTER_EMAIL_DOMAIN }}
          CHANGED_FILES: ${{ steps.content_diff.outputs.changed_files }}
        run: |
          PR_NUMBER=$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")
          PR_TITLE=$(jq -r '.pull_request.title' "$GITHUB_EVENT_PATH")
          PR_URL=$(jq -r '.pull_request.html_url' "$GITHUB_EVENT_PATH")
          PR_AUTHOR=$(jq -r '.pull_request.user.login' "$GITHUB_EVENT_PATH")
          PR_BODY_RAW=$(jq -r '.pull_request.body // "No description provided."' "$GITHUB_EVENT_PATH")
          GITHUB_REPOSITORY=$(jq -r '.repository.full_name' "$GITHUB_EVENT_PATH")
          PR_REF="${GITHUB_REPOSITORY}#${PR_NUMBER}"
          PR_LABEL="dp-github-pr-$(echo "${GITHUB_REPOSITORY}" | tr '/' '-')-${PR_NUMBER}"
          LABEL=$(jq -r '.label.name' "$GITHUB_EVENT_PATH")

          # shellcheck source=.github/scripts/jira_helpers.sh
          source .github/scripts/jira_helpers.sh

          case "$LABEL" in
            "localization needed (high)")
              JIRA_PRIORITY="High"
              ;;
            "localization needed (medium)")
              JIRA_PRIORITY="Medium"
              ;;
            "localization needed (low)")
              JIRA_PRIORITY="Low"
              ;;
            *)
              echo "Unexpected label: ${LABEL}" >&2
              exit 1
              ;;
          esac

          case "$JIRA_PRIORITY" in
            High)   EXTRA_WEEKS=0 ;;
            Medium) EXTRA_WEEKS=1 ;;
            Low)    EXTRA_WEEKS=2 ;;
          esac

          TODAY=$(date -u +%Y-%m-%d)
          DOW=$(date -u +%u)
          DAYS_TO_FOLLOWING_MONDAY=$(( (8 - DOW) % 7 ))
          if [ "$DAYS_TO_FOLLOWING_MONDAY" -eq 0 ]; then
            DAYS_TO_FOLLOWING_MONDAY=7
          fi
          DAYS_TO_DUE=$((DAYS_TO_FOLLOWING_MONDAY + 4 + EXTRA_WEEKS * 7))
          JIRA_DUE_DATE=$(date -u -d "${TODAY} + ${DAYS_TO_DUE} days" +%Y-%m-%d)

          PR_BODY=$(echo "$PR_BODY_RAW" | strip_pr_description_sections | sed \
            -e 's/^#### /h4. /' \
            -e 's/^### /h3. /' \
            -e 's/^## /h2. /' \
            -e 's/^# /h1. /' \
            -e 's/^- /* /' \
            -e 's/`\([^`]*\)`/{{\1}}/g' \
            -e 's/!\[.*\](\([^)]*\))/!\1!/g' \
            -e 's/<img[^>]*src="\([^"]*\)"[^>]*>/!\1!/g')

          if [ -n "$CHANGED_FILES" ]; then
            CHANGED_FILES_SECTION=$(printf '%s\n' "$CHANGED_FILES" | sed 's/^/* /')
          else
            CHANGED_FILES_SECTION="* No MD/MDX files changed"
          fi

          update_parent_issue() {
            local key="$1"
            local labels_json payload response

            labels_json=$(curl -s \
              -u "${LOC_JIRA_USER_EMAIL}:${LOC_JIRA_API_TOKEN}" \
              "${LOC_JIRA_BASE_URL}/rest/api/2/issue/${key}?fields=labels" \
              | jq -c --arg label "$PR_LABEL" \
                '[.fields.labels[]? | if type == "string" then . else .name end] | if index($label) then . else . + [$label] end')

            payload=$(jq -n \
              --arg summary "[DP] ${PR_TITLE}" \
              --arg pr_ref "$PR_REF" \
              --arg pr_author "$PR_AUTHOR" \
              --arg pr_number "$PR_NUMBER" \
              --arg pr_url "$PR_URL" \
              --arg changed_files "$CHANGED_FILES_SECTION" \
              --arg pr_body "$PR_BODY" \
              --arg priority "$JIRA_PRIORITY" \
              --arg duedate "$JIRA_DUE_DATE" \
              --argjson labels "$labels_json" \
              '{
                fields: {
                  summary: $summary,
                  description: (
                    "dp-github-pr-ref: " + $pr_ref + "\n\n" +
                    "h3. PR Details\n" +
                    "||Field||Value||\n" +
                    "|Author|" + $pr_author + "|\n" +
                    "|PR|[#" + $pr_number + "|" + $pr_url + "]|\n\n" +
                    "h3. Changed files\n\n" +
                    $changed_files + "\n\n" +
                    "h3. PR Description\n\n" +
                    $pr_body
                  ),
                  priority: { name: $priority },
                  duedate: $duedate,
                  labels: $labels
                }
              }')

            response=$(curl -s -o update-response.json -w "%{http_code}" \
              -X PUT \
              -H "Content-Type: application/json" \
              -u "${LOC_JIRA_USER_EMAIL}:${LOC_JIRA_API_TOKEN}" \
              -d "$payload" \
              "${LOC_JIRA_BASE_URL}/rest/api/2/issue/${key}")

            if [ "$response" -eq 204 ] || [ "$response" -eq 200 ]; then
              echo "Updated ticket: ${LOC_JIRA_BASE_URL}/browse/${key} (priority: ${JIRA_PRIORITY}, due: ${JIRA_DUE_DATE})"
            else
              echo "Failed to update ticket ${key} (HTTP ${response})" >&2
              cat update-response.json >&2
              exit 1
            fi
          }

          EXISTING_KEY=$(resolve_existing_parent_key || true)
          if [ -n "$EXISTING_KEY" ]; then
            update_parent_issue "$EXISTING_KEY"
            echo "parent_key=${EXISTING_KEY}" >> "$GITHUB_OUTPUT"
            echo "parent_due_date=${JIRA_DUE_DATE}" >> "$GITHUB_OUTPUT"
            echo "Using existing ticket: ${LOC_JIRA_BASE_URL}/browse/${EXISTING_KEY}"
            exit 0
          fi

          JIRA_REPORTER_JSON=$(resolve_jira_reporter_from_github "$PR_AUTHOR" || true)

          PAYLOAD=$(jq -n \
            --arg project "$LOC_JIRA_PROJECT_KEY" \
            --arg epic_key "$LOC_JIRA_EPIC_KEY" \
            --arg pr_title "$PR_TITLE" \
            --arg pr_number "$PR_NUMBER" \
            --arg pr_url "$PR_URL" \
            --arg pr_ref "$PR_REF" \
            --arg pr_label "$PR_LABEL" \
            --arg pr_author "$PR_AUTHOR" \
            --arg pr_body "$PR_BODY" \
            --arg changed_files "$CHANGED_FILES_SECTION" \
            --arg priority "$JIRA_PRIORITY" \
            --arg duedate "$JIRA_DUE_DATE" \
            --argjson reporter "${JIRA_REPORTER_JSON:-null}" \
            '{
              fields: (
                {
                  project: { key: $project },
                  parent: { key: $epic_key },
                  summary: ("[DP] " + $pr_title),
                  description: (
                    "dp-github-pr-ref: " + $pr_ref + "\n\n" +
                    "h3. PR Details\n" +
                    "||Field||Value||\n" +
                    "|Author|" + $pr_author + "|\n" +
                    "|PR|[#" + $pr_number + "|" + $pr_url + "]|\n\n" +
                    "h3. Changed files\n\n" +
                    $changed_files + "\n\n" +
                    "h3. PR Description\n\n" +
                    $pr_body
                  ),
                  issuetype: { name: "Task" },
                  priority: { name: $priority },
                  duedate: $duedate,
                  labels: [$pr_label]
                }
                + (if $reporter == null then {} else {reporter: $reporter} end)
              )
            }')

          RESPONSE=$(curl -s -o response.json -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -u "${LOC_JIRA_USER_EMAIL}:${LOC_JIRA_API_TOKEN}" \
            -d "$PAYLOAD" \
            "${LOC_JIRA_BASE_URL}/rest/api/2/issue")

          if [ "$RESPONSE" -eq 201 ]; then
            TICKET=$(jq -r '.key' response.json)
            echo "parent_key=${TICKET}" >> "$GITHUB_OUTPUT"
            echo "parent_due_date=${JIRA_DUE_DATE}" >> "$GITHUB_OUTPUT"
            echo "Ticket created: ${LOC_JIRA_BASE_URL}/browse/${TICKET} (epic: ${LOC_JIRA_EPIC_KEY}, priority: ${JIRA_PRIORITY}, due: ${JIRA_DUE_DATE})"
          else
            echo "Failed to create ticket (HTTP $RESPONSE)"
            cat response.json
            exit 1
          fi

      - name: Link source Jira tasks from PR
        if: >-
          steps.eligibility.outputs.should_run == 'true' &&
          steps.content_diff.outputs.has_additions == 'true' &&
          steps.production_lock.outputs.updates_blocked != 'true' &&
          steps.parent_ticket.outputs.parent_key != ''
        env:
          LOC_JIRA_BASE_URL: ${{ secrets.LOC_JIRA_BASE_URL }}
          LOC_JIRA_USER_EMAIL: ${{ secrets.LOC_JIRA_USER_EMAIL }}
          LOC_JIRA_API_TOKEN: ${{ secrets.LOC_JIRA_API_TOKEN }}
          PARENT_KEY: ${{ steps.parent_ticket.outputs.parent_key }}
        run: |
          PR_TITLE=$(jq -r '.pull_request.title' "$GITHUB_EVENT_PATH")
          PR_BODY=$(jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH")
          PR_BRANCH=$(jq -r '.pull_request.head.ref' "$GITHUB_EVENT_PATH")
          SOURCE_KEY_PATTERN="${LOC_JIRA_SOURCE_LINK_PROJECT_KEY}-[0-9]+"

          SOURCE_KEYS=$(
            {
              printf '%s\n' "$PR_TITLE" "$PR_BODY" "$PR_BRANCH"
            } | grep -oE "$SOURCE_KEY_PATTERN" | sort -u
          )

          if [ -z "$SOURCE_KEYS" ]; then
            echo "No ${LOC_JIRA_SOURCE_LINK_PROJECT_KEY} tasks found in PR title, description, or branch"
            exit 0
          fi

          echo "Found source tasks to link:"
          printf '%s\n' "$SOURCE_KEYS"

          source_block_exists() {
            local loc_key="$1"
            local source_key="$2"
            curl -s \
              -u "${LOC_JIRA_USER_EMAIL}:${LOC_JIRA_API_TOKEN}" \
              "${LOC_JIRA_BASE_URL}/rest/api/2/issue/${loc_key}?fields=issuelinks" \
              | jq -e --arg loc "$loc_key" --arg source "$source_key" \
                '.fields.issuelinks[]? |
                  select(
                    .type.name == "Blocks" and
                    .inwardIssue.key == $loc and
                    .outwardIssue.key == $source
                  )' >/dev/null
          }

          source_issue_exists() {
            local source_key="$1"
            local http_code
            http_code=$(curl -s -o /dev/null -w "%{http_code}" \
              -u "${LOC_JIRA_USER_EMAIL}:${LOC_JIRA_API_TOKEN}" \
              "${LOC_JIRA_BASE_URL}/rest/api/2/issue/${source_key}")
            [ "$http_code" = "200" ]
          }

          create_source_block_link() {
            local loc_key="$1"
            local source_key="$2"
            local payload response

            payload=$(jq -n \
              --arg loc "$loc_key" \
              --arg source "$source_key" \
              '{
                type: { name: "Blocks" },
                inwardIssue: { key: $loc },
                outwardIssue: { key: $source }
              }')

            response=$(curl -s -o source-link-response.json -w "%{http_code}" \
              -X POST \
              -H "Content-Type: application/json" \
              -u "${LOC_JIRA_USER_EMAIL}:${LOC_JIRA_API_TOKEN}" \
              -d "$payload" \
              "${LOC_JIRA_BASE_URL}/rest/api/2/issueLink")

            if [ "$response" -eq 201 ]; then
              echo "Created block: ${loc_key} blocks ${source_key}"
            else
              echo "Failed to link ${loc_key} blocks ${source_key} (HTTP ${response})" >&2
              cat source-link-response.json >&2
              exit 1
            fi
          }

          while IFS= read -r source_key; do
            [ -z "$source_key" ] && continue

            if ! source_issue_exists "$source_key"; then
              echo "Skipping ${source_key}: issue not found or not accessible" >&2
              continue
            fi

            if source_block_exists "$PARENT_KEY" "$source_key"; then
              echo "Skipped existing block: ${PARENT_KEY} blocks ${source_key}"
              continue
            fi

            create_source_block_link "$PARENT_KEY" "$source_key"
          done <<< "$SOURCE_KEYS"

      - name: Upload touched files to Crowdin
        id: crowdin_upload
        if: >-
          steps.eligibility.outputs.should_run == 'true' &&
          steps.content_diff.outputs.has_additions == 'true' &&
          steps.content_diff.outputs.has_eligible_files == 'true' &&
          steps.production_lock.outputs.updates_blocked != 'true' &&
          steps.parent_ticket.outputs.parent_key != ''
        env:
          LOC_CROWDIN_API_TOKEN: ${{ secrets.LOC_CROWDIN_API_TOKEN }}
          LOC_CROWDIN_PROJECT_ID: ${{ secrets.LOC_CROWDIN_PROJECT_ID }}
          LOC_CROWDIN_ORGANIZATION: ${{ secrets.LOC_CROWDIN_ORGANIZATION }}
          CHANGED_FILES: ${{ steps.content_diff.outputs.changed_files }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          JIRA_TASK_KEY: ${{ steps.parent_ticket.outputs.parent_key }}
        run: |
          if python3 .github/scripts/crowdin_sync.py 2>crowdin-upload-error.log; then
            echo "upload_succeeded=true" >> "$GITHUB_OUTPUT"
          else
            echo "upload_succeeded=false" >> "$GITHUB_OUTPUT"
            {
              echo "upload_error<<EOF_UPLOAD_ERROR"
              tail -40 crowdin-upload-error.log
              echo "EOF_UPLOAD_ERROR"
            } >> "$GITHUB_OUTPUT"
            cat crowdin-upload-error.log >&2
          fi

      - name: Comment on parent task for Crowdin upload failure
        if: >-
          steps.eligibility.outputs.should_run == 'true' &&
          steps.content_diff.outputs.has_additions == 'true' &&
          steps.content_diff.outputs.has_eligible_files == 'true' &&
          steps.production_lock.outputs.updates_blocked != 'true' &&
          steps.parent_ticket.outputs.parent_key != '' &&
          steps.crowdin_upload.outputs.upload_succeeded == 'false'
        env:
          LOC_JIRA_BASE_URL: ${{ secrets.LOC_JIRA_BASE_URL }}
          LOC_JIRA_USER_EMAIL: ${{ secrets.LOC_JIRA_USER_EMAIL }}
          LOC_JIRA_API_TOKEN: ${{ secrets.LOC_JIRA_API_TOKEN }}
          PARENT_KEY: ${{ steps.parent_ticket.outputs.parent_key }}
          UPLOAD_ERROR: ${{ steps.crowdin_upload.outputs.upload_error }}
        run: |
          PR_NUMBER=$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")
          PR_URL=$(jq -r '.pull_request.html_url' "$GITHUB_EVENT_PATH")

          # shellcheck source=.github/scripts/jira_helpers.sh
          source .github/scripts/jira_helpers.sh

          COMMENT_BODY=$(printf '%s\n\n%s\n\nPR: #%s (%s)\n\nError:\n%s' \
            "Crowdin upload failed during localization automation." \
            "The Jira ticket and subtasks were created or updated, but files were not uploaded to Crowdin. Word count and Crowdin editor links were not updated." \
            "$PR_NUMBER" \
            "$PR_URL" \
            "${UPLOAD_ERROR:-See the GitHub Actions log for the Crowdin upload step.}")
          jira_post_comment "$PARENT_KEY" "$COMMENT_BODY"
          echo "Posted Crowdin upload failure comment on ${PARENT_KEY}"

      - name: Update parent task word count
        if: >-
          steps.eligibility.outputs.should_run == 'true' &&
          steps.content_diff.outputs.has_additions == 'true' &&
          steps.production_lock.outputs.updates_blocked != 'true' &&
          steps.parent_ticket.outputs.parent_key != '' &&
          steps.crowdin_upload.outputs.upload_succeeded == 'true'
        env:
          LOC_JIRA_BASE_URL: ${{ secrets.LOC_JIRA_BASE_URL }}
          LOC_JIRA_USER_EMAIL: ${{ secrets.LOC_JIRA_USER_EMAIL }}
          LOC_JIRA_API_TOKEN: ${{ secrets.LOC_JIRA_API_TOKEN }}
          PARENT_KEY: ${{ steps.parent_ticket.outputs.parent_key }}
          CROWDIN_TOTAL_WORDS: ${{ steps.crowdin_upload.outputs.total_words }}
        run: |
          merge_word_count_description() {
            CURRENT="$1" COUNT="$2" python3 .github/scripts/crowdin_sync.py word-count
          }

          current_desc=$(curl -s \
            -u "${LOC_JIRA_USER_EMAIL}:${LOC_JIRA_API_TOKEN}" \
            "${LOC_JIRA_BASE_URL}/rest/api/2/issue/${PARENT_KEY}?fields=description" \
            | jq -r '.fields.description // ""')
          merged_desc=$(merge_word_count_description "$current_desc" "$CROWDIN_TOTAL_WORDS")

          custom_fields=$(jq -n \
            --arg field "$LOC_JIRA_WORD_COUNT_FIELD" \
            --argjson count "$CROWDIN_TOTAL_WORDS" \
            '{($field): $count}')

          payload=$(jq -n \
            --arg description "$merged_desc" \
            --argjson custom_fields "$custom_fields" \
            '{fields: ({description: $description} + $custom_fields)}')

          response=$(curl -s -o update-word-count-response.json -w "%{http_code}" \
            -X PUT \
            -H "Content-Type: application/json" \
            -u "${LOC_JIRA_USER_EMAIL}:${LOC_JIRA_API_TOKEN}" \
            -d "$payload" \
            "${LOC_JIRA_BASE_URL}/rest/api/2/issue/${PARENT_KEY}")

          if [ "$response" -eq 204 ] || [ "$response" -eq 200 ]; then
            echo "Updated word count for ${PARENT_KEY}: ${CROWDIN_TOTAL_WORDS}"
          else
            echo "Failed to update word count for ${PARENT_KEY} (HTTP ${response})" >&2
            cat update-word-count-response.json >&2
            exit 1
          fi

      - name: Comment on PR with Jira link
        if: >-
          steps.eligibility.outputs.should_run == 'true' &&
          steps.content_diff.outputs.has_additions == 'true' &&
          steps.production_lock.outputs.updates_blocked != 'true' &&
          steps.parent_ticket.outputs.parent_key != ''
        env:
          GH_TOKEN: ${{ github.token }}
          LOC_JIRA_BASE_URL: ${{ secrets.LOC_JIRA_BASE_URL }}
          LOC_JIRA_PROJECT_KEY: ${{ secrets.LOC_JIRA_PROJECT_KEY }}
          PARENT_KEY: ${{ steps.parent_ticket.outputs.parent_key }}
          PARENT_DUE_DATE: ${{ steps.parent_ticket.outputs.parent_due_date }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_TITLE=$(jq -r '.pull_request.title' "$GITHUB_EVENT_PATH")
          PR_BODY=$(jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH")
          PR_BRANCH=$(jq -r '.pull_request.head.ref' "$GITHUB_EVENT_PATH")
          JIRA_URL="${LOC_JIRA_BASE_URL}/browse/${PARENT_KEY}"
          SOURCE_KEY_PATTERN="${LOC_JIRA_SOURCE_LINK_PROJECT_KEY}-[0-9]+"

          SOURCE_KEYS=$(
            {
              printf '%s\n' "$PR_TITLE" "$PR_BODY" "$PR_BRANCH"
            } | grep -oE "$SOURCE_KEY_PATTERN" | sort -u
          )

          if [ -n "$SOURCE_KEYS" ]; then
            EDU_LINKS=""
            while IFS= read -r source_key; do
              [ -z "$source_key" ] && continue
              source_url="${LOC_JIRA_BASE_URL}/browse/${source_key}"
              if [ -n "$EDU_LINKS" ]; then
                EDU_LINKS="${EDU_LINKS}, [${source_key}](${source_url})"
              else
                EDU_LINKS="[${source_key}](${source_url})"
              fi
            done <<< "$SOURCE_KEYS"
            TICKET_LINE="Localization ticket [${PARENT_KEY}](${JIRA_URL}) created. It blocks ${EDU_LINKS}."
          else
            TICKET_LINE="Localization ticket [${PARENT_KEY}](${JIRA_URL}) created."
          fi

          COMMENT_FILE=$(mktemp)
          printf '%s\n' \
            '> ### :globe_with_meridians: Localization task' \
            '>' \
            "> ${TICKET_LINE}" \
            "> Estimated delivery date: \`${PARENT_DUE_DATE}\`" \
            > "$COMMENT_FILE"

          EXISTING_COMMENT=$(gh api \
            "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --paginate \
            | jq -r --arg project "$LOC_JIRA_PROJECT_KEY" \
              '.[] | select(.body | test(":globe_with_meridians: Localization task|Localization ticket \\[" + $project + "-[0-9]+\\]")) | .id' \
              | head -1)

          if [ -n "$EXISTING_COMMENT" ]; then
            jq -n --rawfile body "$COMMENT_FILE" '{body: $body}' | \
              gh api -X PATCH \
                "repos/${{ github.repository }}/issues/comments/${EXISTING_COMMENT}" \
                --input -
            echo "Updated PR comment"
            cat "$COMMENT_FILE"
            rm -f "$COMMENT_FILE"
            exit 0
          fi

          gh pr comment "$PR_NUMBER" --body-file "$COMMENT_FILE"
          echo "Posted PR comment:"
          cat "$COMMENT_FILE"
          rm -f "$COMMENT_FILE"

      - name: Create localization subtasks
        if: >-
          steps.eligibility.outputs.should_run == 'true' &&
          steps.content_diff.outputs.has_additions == 'true' &&
          steps.production_lock.outputs.updates_blocked != 'true' &&
          steps.parent_ticket.outputs.parent_key != ''
        env:
          LOC_JIRA_BASE_URL: ${{ secrets.LOC_JIRA_BASE_URL }}
          LOC_JIRA_USER_EMAIL: ${{ secrets.LOC_JIRA_USER_EMAIL }}
          LOC_JIRA_API_TOKEN: ${{ secrets.LOC_JIRA_API_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          LOC_JIRA_PROJECT_KEY: ${{ secrets.LOC_JIRA_PROJECT_KEY }}
          LOC_JIRA_REPORTER_EMAIL_DOMAIN: ${{ env.LOC_JIRA_REPORTER_EMAIL_DOMAIN }}
          PARENT_KEY: ${{ steps.parent_ticket.outputs.parent_key }}
          PARENT_DUE_DATE: ${{ steps.parent_ticket.outputs.parent_due_date }}
          CROWDIN_UPLOAD_SUCCEEDED: ${{ steps.crowdin_upload.outputs.upload_succeeded }}
          CROWDIN_EDITOR_LINKS: ${{ steps.crowdin_upload.outputs.editor_links }}
          CROWDIN_TOTAL_WORDS: ${{ steps.crowdin_upload.outputs.total_words }}
        run: |
          PR_AUTHOR=$(jq -r '.pull_request.user.login' "$GITHUB_EVENT_PATH")

          if [ -z "$PARENT_DUE_DATE" ]; then
            echo "Parent due date is missing; cannot set subtask due dates." >&2
            exit 1
          fi

          # shellcheck source=.github/scripts/jira_helpers.sh
          source .github/scripts/jira_helpers.sh

          JIRA_REPORTER_JSON=$(resolve_jira_reporter_from_github "$PR_AUTHOR" || true)

          TODAY=$(date -u +%Y-%m-%d)
          DOW=$(date -u +%u)
          DAYS_TO_FOLLOWING_MONDAY=$(( (8 - DOW) % 7 ))
          if [ "$DAYS_TO_FOLLOWING_MONDAY" -eq 0 ]; then
            DAYS_TO_FOLLOWING_MONDAY=7
          fi
          FOLLOWING_MONDAY=$(date -u -d "${TODAY} + ${DAYS_TO_FOLLOWING_MONDAY} days" +%Y-%m-%d)

          last_weekday_before() {
            local reference="$1"
            local target_dow="$2"
            local candidate
            candidate=$(date -u -d "${reference} - 1 day" +%Y-%m-%d)
            while [ "$(date -u -d "$candidate" +%u)" -ne "$target_dow" ]; do
              candidate=$(date -u -d "${candidate} - 1 day" +%Y-%m-%d)
            done
            echo "$candidate"
          }

          subtask_due_date() {
            local summary="$1"
            local due

            case "$summary" in
              "Prepare file to be localized")
                due=$(last_weekday_before "$PARENT_DUE_DATE" 5)
                if [[ "$(date -u -d "$due" +%s)" -le "$(date -u -d "$TODAY" +%s)" ]]; then
                  due="$FOLLOWING_MONDAY"
                fi
                ;;
              "English revision")
                due=$(last_weekday_before "$PARENT_DUE_DATE" 4)
                ;;
              *)
                due="$PARENT_DUE_DATE"
                ;;
            esac

            echo "$due"
          }

          SUBTASK_SUMMARIES=(
            "Prepare file to be localized"
            "English revision"
            "Create PR"
          )

          fetch_child_issues() {
            local response http_code body search_result

            response=$(curl -s -w "\n%{http_code}" \
              -u "${LOC_JIRA_USER_EMAIL}:${LOC_JIRA_API_TOKEN}" \
              "${LOC_JIRA_BASE_URL}/rest/api/2/issue/${PARENT_KEY}?fields=subtasks")
            http_code=$(echo "$response" | tail -1)
            body=$(echo "$response" | sed '$d')

            if [ "$http_code" = "200" ]; then
              echo "$body" | jq '{
                issues: [.fields.subtasks[]? | {
                  key: .key,
                  fields: {
                    summary: .fields.summary,
                    created: (.fields.created // "")
                  }
                }]
              }'
              return 0
            fi

            echo "Failed to fetch subtasks via parent issue (HTTP ${http_code}); trying Jira search" >&2
            search_result=$(jira_post_search \
              "parent = ${PARENT_KEY} ORDER BY created ASC" \
              "summary,created" \
              100) || {
              echo "Failed to fetch subtasks for ${PARENT_KEY}" >&2
              exit 1
            }
            echo "$search_result"
          }

          find_existing_subtask_key() {
            local summary="$1"
            local existing_json="$2"
            echo "$existing_json" | jq -r --arg summary "$summary" \
              '[.issues[]? | select(.fields.summary == $summary)] |
               sort_by(.fields.created // .key) | .[0].key // empty'
          }

          EXISTING=$(fetch_child_issues)

          create_subtask() {
            local summary="$1"
            local duedate="$2"
            local payload
            payload=$(jq -n \
              --arg project "$LOC_JIRA_PROJECT_KEY" \
              --arg parent "$PARENT_KEY" \
              --arg summary "$summary" \
              --arg duedate "$duedate" \
              --argjson reporter "${JIRA_REPORTER_JSON:-null}" \
              '{
                fields: (
                  {
                    project: { key: $project },
                    parent: { key: $parent },
                    summary: $summary,
                    issuetype: { name: "Subtask" },
                    duedate: $duedate
                  }
                  + (if $reporter == null then {} else {reporter: $reporter} end)
                )
              }')

            local response
            response=$(curl -s -o subtask-response.json -w "%{http_code}" \
              -X POST \
              -H "Content-Type: application/json" \
              -u "${LOC_JIRA_USER_EMAIL}:${LOC_JIRA_API_TOKEN}" \
              -d "$payload" \
              "${LOC_JIRA_BASE_URL}/rest/api/2/issue")

            if [ "$response" -eq 201 ]; then
              jq -r '.key' subtask-response.json
            else
              echo "Failed to create subtask \"${summary}\" (HTTP ${response})" >&2
              cat subtask-response.json >&2
              exit 1
            fi
          }

          update_issue_due_date() {
            local key="$1"
            local duedate="$2"
            local payload response

            payload=$(jq -n --arg duedate "$duedate" '{fields: {duedate: $duedate}}')
            response=$(curl -s -o update-due-response.json -w "%{http_code}" \
              -X PUT \
              -H "Content-Type: application/json" \
              -u "${LOC_JIRA_USER_EMAIL}:${LOC_JIRA_API_TOKEN}" \
              -d "$payload" \
              "${LOC_JIRA_BASE_URL}/rest/api/2/issue/${key}")

            if [ "$response" -eq 204 ] || [ "$response" -eq 200 ]; then
              echo "Updated due date for ${key}: ${duedate}"
            else
              echo "Failed to update due date for ${key} (HTTP ${response})" >&2
              cat update-due-response.json >&2
              exit 1
            fi
          }

          merge_crowdin_description() {
            CURRENT="$1" LINKS="$2" python3 .github/scripts/crowdin_sync.py crowdin-links
          }

          update_subtask_crowdin_links() {
            local key="$1"
            local links="$2"
            local summary="$3"
            local current_desc merged_desc payload response

            if [ -z "$links" ]; then
              echo "Missing Crowdin editor links for ${summary} subtask ${key}" >&2
              exit 1
            fi

            current_desc=$(curl -s \
              -u "${LOC_JIRA_USER_EMAIL}:${LOC_JIRA_API_TOKEN}" \
              "${LOC_JIRA_BASE_URL}/rest/api/2/issue/${key}?fields=description" \
              | jq -r '.fields.description // ""')
            merged_desc=$(merge_crowdin_description "$current_desc" "$links")

            payload=$(jq -n \
              --arg description "$merged_desc" \
              '{fields: {description: $description}}')

            response=$(curl -s -o update-crowdin-response.json -w "%{http_code}" \
              -X PUT \
              -H "Content-Type: application/json" \
              -u "${LOC_JIRA_USER_EMAIL}:${LOC_JIRA_API_TOKEN}" \
              -d "$payload" \
              "${LOC_JIRA_BASE_URL}/rest/api/2/issue/${key}")

            if [ "$response" -eq 204 ] || [ "$response" -eq 200 ]; then
              echo "Updated Crowdin links for ${key}"
            else
              echo "Failed to update Crowdin links for ${key} (HTTP ${response})" >&2
              cat update-crowdin-response.json >&2
              exit 1
            fi
          }

          is_language_subtask() {
            case "$1" in
              English*|Portuguese*|Spanish*) return 0 ;;
              *) return 1 ;;
            esac
          }

          update_subtask_word_count() {
            local key="$1"
            local summary="$2"
            local payload response

            payload=$(jq -n \
              --arg field "$LOC_JIRA_WORD_COUNT_FIELD" \
              --argjson count "$CROWDIN_TOTAL_WORDS" \
              '{fields: {($field): $count}}')

            response=$(curl -s -o update-subtask-word-count-response.json -w "%{http_code}" \
              -X PUT \
              -H "Content-Type: application/json" \
              -u "${LOC_JIRA_USER_EMAIL}:${LOC_JIRA_API_TOKEN}" \
              -d "$payload" \
              "${LOC_JIRA_BASE_URL}/rest/api/2/issue/${key}")

            if [ "$response" -eq 204 ] || [ "$response" -eq 200 ]; then
              echo "Updated word count for ${key} (${summary}): ${CROWDIN_TOTAL_WORDS}"
            else
              echo "Failed to update word count for ${key} (HTTP ${response})" >&2
              cat update-subtask-word-count-response.json >&2
              exit 1
            fi
          }

          rank_subtask_after() {
            local key="$1"
            local after_key="$2"
            local payload
            payload=$(jq -n \
              --arg key "$key" \
              --arg after "$after_key" \
              '{issues: [$key], rankAfterIssue: $after}')

            local response
            response=$(curl -s -o rank-response.json -w "%{http_code}" \
              -X PUT \
              -H "Content-Type: application/json" \
              -u "${LOC_JIRA_USER_EMAIL}:${LOC_JIRA_API_TOKEN}" \
              -d "$payload" \
              "${LOC_JIRA_BASE_URL}/rest/agile/1.0/issue/rank")

            if [ "$response" -ne 204 ]; then
              echo "Failed to order subtask ${key} after ${after_key} (HTTP ${response})"
              cat rank-response.json
              exit 1
            fi
          }

          block_link_exists() {
            local blocker="$1"
            local blocked="$2"
            curl -s \
              -u "${LOC_JIRA_USER_EMAIL}:${LOC_JIRA_API_TOKEN}" \
              "${LOC_JIRA_BASE_URL}/rest/api/2/issue/${blocked}?fields=issuelinks" \
              | jq -e --arg blocker "$blocker" --arg blocked "$blocked" \
                '.fields.issuelinks[]? |
                  select(
                    .type.name == "Blocks" and
                    .inwardIssue.key == $blocker and
                    .outwardIssue.key == $blocked
                  )' >/dev/null
          }

          create_block_link() {
            local blocker="$1"
            local blocked="$2"

            if block_link_exists "$blocker" "$blocked"; then
              echo "Skipped existing block: ${blocker} blocks ${blocked}"
              return 0
            fi

            local payload
            payload=$(jq -n \
              --arg blocker "$blocker" \
              --arg blocked "$blocked" \
              '{
                type: { name: "Blocks" },
                outwardIssue: { key: $blocked },
                inwardIssue: { key: $blocker }
              }')

            local response
            response=$(curl -s -o block-link-response.json -w "%{http_code}" \
              -X POST \
              -H "Content-Type: application/json" \
              -u "${LOC_JIRA_USER_EMAIL}:${LOC_JIRA_API_TOKEN}" \
              -d "$payload" \
              "${LOC_JIRA_BASE_URL}/rest/api/2/issueLink")

            if [ "$response" -eq 201 ]; then
              echo "Created block: ${blocker} blocks ${blocked}"
            else
              echo "Failed to create block ${blocker} -> ${blocked} (HTTP ${response})"
              cat block-link-response.json
              exit 1
            fi
          }

          # 0-based ORDERED_KEYS indices: blocker:blocked
          BLOCK_INDEX_PAIRS=(
            "0:1"
            "1:2"
          )

          ORDERED_KEYS=()
          for summary in "${SUBTASK_SUMMARIES[@]}"; do
            subtask_due=$(subtask_due_date "$summary")
            already_exists=$(find_existing_subtask_key "$summary" "$EXISTING")

            if [ -n "$already_exists" ]; then
              key="$already_exists"
              update_issue_due_date "$key" "$subtask_due"
              echo "Updated existing subtask: ${LOC_JIRA_BASE_URL}/browse/${key} — ${summary} (due: ${subtask_due})"
            else
              key=$(create_subtask "$summary" "$subtask_due")
              echo "Created subtask: ${LOC_JIRA_BASE_URL}/browse/${key} — ${summary} (due: ${subtask_due})"
              EXISTING=$(fetch_child_issues)
            fi

            ORDERED_KEYS+=("$key")
          done

          for i in "${!ORDERED_KEYS[@]}"; do
            if [ "$i" -eq 0 ]; then
              continue
            fi
            rank_subtask_after "${ORDERED_KEYS[$i]}" "${ORDERED_KEYS[$((i - 1))]}"
          done

          echo "Subtasks ordered:"
          for i in "${!ORDERED_KEYS[@]}"; do
            echo "$((i + 1)). ${ORDERED_KEYS[$i]} — ${SUBTASK_SUMMARIES[$i]}"
          done

          echo "Creating subtask block links..."
          for pair in "${BLOCK_INDEX_PAIRS[@]}"; do
            blocker_index="${pair%%:*}"
            blocked_index="${pair##*:}"
            create_block_link \
              "${ORDERED_KEYS[$blocker_index]}" \
              "${ORDERED_KEYS[$blocked_index]}"
          done

          if [ "$CROWDIN_UPLOAD_SUCCEEDED" = "true" ]; then
            update_subtask_crowdin_links \
              "${ORDERED_KEYS[1]}" \
              "$CROWDIN_EDITOR_LINKS" \
              "English revision"
          else
            echo "Skipping Crowdin editor links (Crowdin upload failed or was skipped)"
          fi

          if [ "$CROWDIN_UPLOAD_SUCCEEDED" = "true" ]; then
            echo "Updating word count on language subtasks..."
            for i in "${!SUBTASK_SUMMARIES[@]}"; do
              summary="${SUBTASK_SUMMARIES[$i]}"
              if is_language_subtask "$summary"; then
                update_subtask_word_count "${ORDERED_KEYS[$i]}" "$summary"
              fi
            done
          else
            echo "Skipping subtask word counts (Crowdin upload failed or was skipped)"
          fi

      - name: Comment on parent task for Crowdin upload success
        if: >-
          steps.eligibility.outputs.should_run == 'true' &&
          steps.content_diff.outputs.has_additions == 'true' &&
          steps.content_diff.outputs.has_eligible_files == 'true' &&
          steps.production_lock.outputs.updates_blocked != 'true' &&
          steps.parent_ticket.outputs.parent_key != '' &&
          steps.crowdin_upload.outputs.upload_succeeded == 'true'
        env:
          LOC_JIRA_BASE_URL: ${{ secrets.LOC_JIRA_BASE_URL }}
          LOC_JIRA_USER_EMAIL: ${{ secrets.LOC_JIRA_USER_EMAIL }}
          LOC_JIRA_API_TOKEN: ${{ secrets.LOC_JIRA_API_TOKEN }}
          PARENT_KEY: ${{ steps.parent_ticket.outputs.parent_key }}
        run: |
          # shellcheck source=.github/scripts/jira_helpers.sh
          source .github/scripts/jira_helpers.sh

          jira_post_comment "$PARENT_KEY" "$CROWDIN_UPLOAD_SUCCESS_COMMENT"
          echo "Posted Crowdin upload success comment on ${PARENT_KEY}"
