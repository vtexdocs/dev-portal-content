# This workflow is designed for vtexdocs content repositories.
# Copy to vtexdocs/help-center-content or vtexdocs/dev-portal-content

name: Index Documents

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'docs/**/*.md'
  workflow_dispatch:
    inputs:
      full_reindex:
        description: 'Reindex all documents'
        required: false
        default: false
        type: boolean

jobs:
  index-documents:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Compute changed files
        id: changed
        run: |
          if [ "${{ github.event.inputs.full_reindex }}" = "true" ] || [ "${{ github.event_name }}" = "workflow_dispatch" -a "${{ github.event.inputs.full_reindex }}" = "true" ]; then
            FILES=$(find docs -name '*.md' -type f | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            FILES=$(git -c core.quotepath=false diff --name-only --diff-filter=ACMR HEAD~1 HEAD -- 'docs/**/*.md' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "count=$(echo $FILES | jq length)" >> $GITHUB_OUTPUT

      - name: Exit early if no files
        run: |
          if [ "${{ steps.changed.outputs.count }}" = "0" ]; then
            echo "No changed files"
            exit 0
          fi

      - name: POST to indexing endpoint
        env:
          FILES_JSON: ${{ steps.changed.outputs.files }}
        run: |
          BATCH_SIZE=10
          TOTAL=$(echo "$FILES_JSON" | jq length)
          echo "Indexing $TOTAL files in batches of $BATCH_SIZE"

          PROCESSED=0
          SKIPPED=0
          CHUNKS=0
          FAILED=0

          for OFFSET in $(seq 0 $BATCH_SIZE $((TOTAL - 1))); do
            BATCH=$(echo "$FILES_JSON" | jq -c ".[$OFFSET:$OFFSET+$BATCH_SIZE]")
            BATCH_LEN=$(echo "$BATCH" | jq length)
            echo ""
            echo "==> Batch $((OFFSET / BATCH_SIZE + 1)): $BATCH_LEN file(s) starting at index $OFFSET"

            echo "{\"files\": ${BATCH}, \"repository\": \"${{ github.repository }}\", \"branch\": \"main\"}" > /tmp/payload.json

            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${{ secrets.INDEXING_URL }}/api/index-documents" \
              -H "Content-Type: application/json" \
              -H "X-Internal-Access-Key: ${{ secrets.INTERNAL_ACCESS_KEY }}" \
              --max-time 300 \
              -d @/tmp/payload.json)

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')

            echo "HTTP Status: $HTTP_CODE"

            if [ "$HTTP_CODE" != "200" ]; then
              echo "::error::Batch failed with HTTP $HTTP_CODE: $BODY"
              FAILED=$((FAILED + BATCH_LEN))
              continue
            fi

            B_PROC=$(echo "$BODY" | jq -r '.processed // 0')
            B_SKIP=$(echo "$BODY" | jq -r '.documents_skipped // 0')
            B_CHUNKS=$(echo "$BODY" | jq -r '.chunks_created // 0')
            B_DUR=$(echo "$BODY" | jq -r '.duration_ms // 0')

            PROCESSED=$((PROCESSED + B_PROC))
            SKIPPED=$((SKIPPED + B_SKIP))
            CHUNKS=$((CHUNKS + B_CHUNKS))

            echo "Batch result: ${B_PROC} processed, ${B_SKIP} skipped, ${B_CHUNKS} chunks in ${B_DUR}ms"

            if [ "$B_PROC" = "0" ] && [ "$B_SKIP" = "0" ]; then
              echo "::warning::No documents processed in this batch"
              echo "$BODY" | jq '.errors // empty'
            fi
          done

          echo ""
          echo "=== TOTAL ==="
          echo "Processed: $PROCESSED"
          echo "Skipped: $SKIPPED"
          echo "Chunks created: $CHUNKS"

          if [ "$FAILED" != "0" ]; then
            echo "::warning::$FAILED total file(s) failed to index"
          fi
