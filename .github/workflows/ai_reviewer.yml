name: Review Documentation with AI

on:
  pull_request:
    paths:
      - 'docs/**/*.md'
      - 'docs/**/*.mdx'
    types: [labeled]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  get-changed-files:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'AI style review'
    outputs:
      files: ${{ steps.get-files.outputs.files }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Get changed files
        id: get-files
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number('${{ github.event.pull_request.number }}');
            const { data: prFiles } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            const mdMdx = prFiles
              .filter(f => f.filename.endsWith('.md') || f.filename.endsWith('.mdx'))
              .filter(f => f.filename.startsWith('docs/'))
              .map(f => f.filename);
            core.setOutput('files', JSON.stringify(mdMdx));

  ai-reviewer:
    needs: get-changed-files
    runs-on: ubuntu-latest
    if: |
      needs.get-changed-files.result == 'success' &&
      needs.get-changed-files.outputs.files != '[]' &&
      needs.get-changed-files.outputs.files != ''
    strategy:
      fail-fast: false
      matrix:
        file: ${{ fromJson(needs.get-changed-files.outputs.files) }}
    steps:
    - uses: actions/setup-python@v5
    - uses: actions/checkout@v6
    - uses: vtexdocs/ai-documentation-reviewer-action@v1
      id: generate-feedback
      with:
        gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
        file_paths: ${{ matrix.file }}
    - name: Post or update review with AI feedback
      uses: actions/github-script@v7
      env:
        FILE_PATH: ${{ matrix.file }}
        FEEDBACK: ${{ steps.generate-feedback.outputs.response }}
      with:
        script: |
          const filePath = process.env.FILE_PATH;
          const feedback = process.env.FEEDBACK ?? '';
          const marker = `<!--${filePath}-->`;
          const issueNumber = context.payload.pull_request.number;
          const commitId = context.payload.pull_request.head.sha;

          const body = [
            marker,
            '<details>',
            `<summary><h3>🔍 Documentation feedback for ${filePath}</h3></summary>`,
            '',
            feedback,
            '',
            '<hr><h3 id="ai-feedback">Was this feedback useful?</h3>',
            '',
            '- [ ] Yes',
            '- [ ] No',
            '</details>',
            '',
            `Review made on commit ${commitId}`
          ].join('\n');

          const comments = await github.paginate(github.rest.issues.listComments, {
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: issueNumber,
            per_page: 100
          });

          const botComments = comments.filter((c) => c.user?.type === 'Bot');
          const existing = botComments.find((c) => c.body && c.body.includes(marker));

          if (existing) {
            const timestamp = new Date().toISOString().replace('T', ' ').slice(0, 16) + ' UTC';
            const bodyWithEdited = `${body}\n\n*Edited on ${timestamp}*`;
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body: bodyWithEdited
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body
            });
          }

  update-labels:
    needs: [get-changed-files, ai-reviewer]
    if: always() && needs.get-changed-files.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Remove AI style review label and add AI reviewed
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.payload.pull_request.number;
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              name: 'AI style review'
            }).catch(() => {});
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['AI reviewed']
            });
