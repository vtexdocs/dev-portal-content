name: Check Broken Links

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'docs/**/*.md'
      - 'docs/**/*.mdx'
      - '!docs/localization/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  check-broken-links:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Ensure all branches are accessible

      # Step 2: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      # Step 3: Install necessary dependencies
      - name: Install dependencies
        run: npm install node-fetch

      - name: Install Reviewdog
        uses: reviewdog/action-setup@v1

      # Step 4: Get all changed markdown files
      - name: Get all changed markdown files
        id: changed-markdown-files
        uses: tj-actions/changed-files@v45
        with:
          files: |
             **.md
             **.mdx

      - name: List all changed files
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-markdown-files.outputs.all_changed_files }}
        run: |
          for file in ${ALL_CHANGED_FILES}; do
            echo "$file was changed"
          done

      # Step 6: Check for broken links in changed markdown files
      - name: Check for broken links
        id: collect-broken-link-issues
        if: steps.changed-markdown-files.outputs.any_changed == 'true'
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-markdown-files.outputs.all_changed_files }}
          LINK_ISSUES_FILE: link_issues.txt
        run: |
          for file in ${ALL_CHANGED_FILES}; do
            echo "Checking for broken links in $file"
            node .github/scripts/check-links-pr.mjs "$file"
          done
          if [ -f "$LINK_ISSUES_FILE" ] && [ -s "$LINK_ISSUES_FILE" ]; then
            echo "has_issues=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Reviewdog
        if: steps.collect-broken-link-issues.outputs.has_issues == 'true'
        run: |
          echo "Running Reviewdog with the following style issues:"
          reviewdog -efm="%f:%l:%c:%m" -name="link-check" -reporter=github-pr-review -filter-mode=nofilter < link_issues.txt
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}